<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            width: 100%;
            max-width: 480px;
        }

        .card-header {
            height: 4px;
            background: linear-gradient(90deg, #1a1a2e 0%, #4f46e5 100%);
        }

        .card-body {
            padding: 40px;
        }

        .icon {
            width: 48px;
            height: 48px;
            background: #1a1a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 24px;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #4f46e5;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Georgia', serif;
        }

        .form-group input:focus {
            border-color: #4f46e5;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #1a1a2e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 24px;
            font-family: 'Georgia', serif;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 24px 0;
        }

        .footer-note {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-header"></div>
        <div class="card-body">

            <div class="icon">🔐</div>

            <p class="label">Segurança da conta</p>
            <h1>Redefinição<br>de senha</h1>

            <div class="form-group">
                <label for="novaSenha">Nova senha</label>
                <input type="password" id="novaSenha" placeholder="Digite sua nova senha" minlength="6" />
            </div>

            <div class="form-group">
                <label for="confirmarSenha">Confirmar nova senha</label>
                <input type="password" id="confirmarSenha" placeholder="Confirme sua nova senha" minlength="6" />
            </div>

            <button class="btn" id="btnSalvar" onclick="redefinirSenha()">
                Salvar nova senha
            </button>

            <div class="message" id="mensagem"></div>

            <div class="divider"></div>

            <p class="footer-note">
                Após redefinir sua senha, volte ao app e faça login normalmente.
            </p>

        </div>
    </div>

    <script>
        // Pega o token da URL automaticamente
        function getToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        function mostrarMensagem(texto, tipo) {
            const el = document.getElementById('mensagem');
            el.textContent = texto;
            el.className = `message ${tipo}`;
            el.style.display = 'block';
        }

        async function redefinirSenha() {
            const token = getToken();
            const novaSenha = document.getElementById('novaSenha').value.trim();
            const confirmarSenha = document.getElementById('confirmarSenha').value.trim();
            const btn = document.getElementById('btnSalvar');

            // Validações
            if (!token) {
                mostrarMensagem('Link inválido ou expirado.', 'error');
                return;
            }

            if (novaSenha.length < 6) {
                mostrarMensagem('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }

            if (novaSenha !== confirmarSenha) {
                mostrarMensagem('As senhas não coincidem.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nova_senha: novaSenha }),
                });

                const data = await response.json();

                if (response.ok) {
                    mostrarMensagem('Senha redefinida com sucesso! Volte ao app e faça login.', 'success');
                    btn.style.display = 'none';
                } else {
                    mostrarMensagem(data.message || 'Erro ao redefinir senha. Tente novamente.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Salvar nova senha';
                }
            } catch (e) {
                mostrarMensagem('Erro de conexão. Tente novamente.', 'error');
                btn.disabled = false;
                btn.textContent = 'Salvar nova senha';
            }
        }
    </script>

</body>

</html>
